<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <section class="login" id="loginScreen">
    <div class="login-card">
      <div class="login-brand">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <h1>Sign in</h1>
      <p class="muted">Create your profile to start chatting (demo).</p>

      <form id="loginForm" class="login-form">
        <label>
          Your Name
          <input id="profileName" type="text" placeholder="e.g. Abdessalam" autocomplete="name" required />
        </label>

        <label>
          Your Status
          <input id="profileStatus" type="text" placeholder="e.g. Available" />
        </label>

        <label>
          Avatar
          <input id="profileAvatar" type="file" accept="image/*" />
        </label>

        <button class="send-btn" type="submit">Enter MiniChat</button>
      </form>

      <p class="hint">Your profile is saved in your browser (LocalStorage).</p>
    </div>
  </section>

  <!-- APP -->
  <div class="app hidden" id="appRoot">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="side-top">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">MiniChat</span>
        </div>

        <div class="top-actions">
          <button class="icon-btn" id="newChatBtn" title="New contact">＋</button>
          <button class="icon-btn" id="logoutBtn" title="Logout">⎋</button>
        </div>
      </div>

      <div class="me">
        <div class="avatar me-avatar" id="meAvatar">U</div>
        <div class="me-meta">
          <div class="me-name" id="meName">User</div>
          <div class="me-status" id="meStatus">—</div>
        </div>
      </div>

      <div class="search">
        <input id="searchInput" type="text" placeholder="Search contacts..." />
      </div>

      <div class="contacts" id="contacts"></div>

      <div class="side-bottom">
        <button class="ghost-btn" id="clearAllBtn">Clear all chats</button>
      </div>
    </aside>

    <!-- Chat -->
    <main class="chat">
      <header class="chat-top" id="chatTop">
        <div class="chat-user">
          <div class="avatar" id="chatAvatar">A</div>
          <div class="chat-meta">
            <div class="chat-name" id="chatName">Select a contact</div>
            <div class="chat-status" id="chatStatus">—</div>
          </div>
        </div>

        <div class="chat-actions">
          <button class="icon-btn" id="toggleSidebarBtn" title="Contacts">☰</button>
          <button class="icon-btn" id="deleteChatBtn" title="Delete chat" disabled>🗑</button>
        </div>
      </header>

      <section class="messages" id="messages">
        <div class="empty">
          <h2>Welcome 👋</h2>
          <p>Select a contact to start chatting.</p>
        </div>
      </section>

      <footer class="composer">
        <input id="messageInput" type="text" placeholder="Type a message..." disabled />
        <button class="send-btn" id="sendBtn" disabled>Send</button>
      </footer>
    </main>
  </div>

  <!-- Modal: add new contact -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal">
      <h3>New Contact</h3>
      <input id="newName" type="text" placeholder="Name (e.g. Sara)" />
      <input id="newStatus" type="text" placeholder="Status (e.g. Online)" />
      <div class="modal-actions">
        <button class="ghost-btn" id="cancelModal">Cancel</button>
        <button class="send-btn" id="saveContact">Save</button>
      </div>
      <p class="hint">Messages are saved in your browser (LocalStorage).</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
