<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <section class="login" id="loginScreen">
    <div class="card">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <h1 class="title">Sign in</h1>

      <form id="profileForm" class="form">
        <label>
          Your Name
          <input type="text" id="profileName" placeholder="e.g. Abdessalam" required />
        </label>

        <label>
          Your Status
          <input type="text" id="profileStatus" placeholder="e.g. Online" required />
        </label>

        <button class="btn primary" type="submit">Enter MiniChat</button>

        <p class="hint">Your profile is saved in your browser (LocalStorage).</p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <div class="app hidden" id="appRoot">
    <header class="topbar">
      <div class="brand small">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <div class="profile">
        <div class="avatar" id="avatar">A</div>
        <div class="profile-info">
          <div class="profile-name" id="userName">User</div>
          <div class="profile-status" id="userStatus">Online</div>
        </div>

        <button class="btn ghost" id="addContactBtn" type="button">+ New Contact</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Contacts</h2>
          <small id="contactsCount">0</small>
        </div>

        <div class="contacts" id="contactsList">
          <!-- contacts injected -->
        </div>
      </aside>

      <section class="chat">
        <div class="chat-head">
          <div class="chat-title">
            <div class="chat-avatar" id="activeAvatar">?</div>
            <div>
              <div class="chat-name" id="activeName">Select a contact</div>
              <div class="chat-sub" id="activeSub">Start chatting</div>
            </div>
          </div>

          <button class="btn ghost" id="clearChatBtn" type="button">Clear Chat</button>
        </div>

        <div class="messages" id="messages"></div>

        <form class="composer" id="messageForm">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            required
            disabled
          />
          <button class="btn primary" type="submit" id="sendBtn" disabled>Send</button>
        </form>

        <p class="hint center">Messages are saved in your browser (LocalStorage).</p>
      </section>
    </main>
  </div>

  <!-- MODAL BACKDROP -->
  <div class="modal-backdrop hidden" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle">New Contact</h3>

      <form id="contactForm" class="form">
        <label>
          Name
          <input type="text" id="contactName" placeholder="Name (e.g. Sara)" required />
        </label>

        <label>
          Status
          <input type="text" id="contactStatus" placeholder="Status (e.g. Online)" required />
        </label>

        <div class="row">
          <!-- مهم: type="button" باش Cancel ما يديرش submit -->
          <button class="btn" type="button" id="cancelBtn">Cancel</button>
          <button class="btn primary" type="submit" id="saveBtn">Save</button>
        </div>

        <p class="hint">Messages are saved in your browser (LocalStorage).</p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
