<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH -->
  <section class="login" id="loginScreen">
    <div class="card">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <h1 class="title" id="authTitle">Sign in</h1>

      <form id="loginForm" class="form">
        <label>Email
          <input type="email" id="loginEmail" placeholder="you@gmail.com" required />
        </label>

        <label>Password
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </label>

        <button class="btn primary" type="submit">Login</button>

        <p class="hint center">
          No account?
          <button type="button" class="btn ghost" id="goRegisterBtn">Create one</button>
        </p>
      </form>

      <form id="registerForm" class="form hidden">
        <label>Full Name
          <input type="text" id="registerName" placeholder="e.g. Abdessalam" required />
        </label>

        <label>Email
          <input type="email" id="registerEmail" placeholder="you@gmail.com" required />
        </label>

        <label>Password (min 6)
          <input type="password" id="registerPassword" placeholder="••••••••" required />
        </label>

        <button class="btn primary" type="submit">Create Account</button>

        <p class="hint center">
          Already have an account?
          <button type="button" class="btn ghost" id="goLoginBtn">Back to login</button>
        </p>
      </form>

      <p class="hint center" id="authMsg" style="margin-top:10px;"></p>
    </div>
  </section>

  <!-- APP -->
  <div class="app hidden" id="appRoot">
    <header class="topbar">
      <div class="brand small">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <div class="profile">
        <div class="avatar" id="avatar">A</div>
        <div class="profile-info">
          <div class="profile-name" id="userName">User</div>
          <div class="profile-status" id="userStatus">Online</div>
        </div>

        <button class="btn ghost" id="addContactBtn" type="button">+ New Chat</button>
        <button class="btn ghost" id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Chats</h2>
          <small id="contactsCount">0</small>
        </div>

        <div class="searchbox">
          <input id="searchInput" placeholder="Search..." />
        </div>

        <div class="contacts" id="contactsList"></div>
      </aside>

      <section class="chat">
        <div class="chat-head">
          <div class="chat-title">
            <div class="chat-avatar" id="activeAvatar">?</div>
            <div>
              <div class="chat-name" id="activeName">Select a chat</div>
              <div class="chat-sub">
                <span id="activeSub">—</span>
                <span id="typingIndicator" class="typing hidden"> • typing…</span>
              </div>
            </div>
          </div>

          <div class="chat-actions">
            <button class="btn ghost" id="clearChatBtn" type="button">Clear</button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <form class="composer" id="messageForm">
          <label class="attach">
            📎
            <input type="file" id="imageInput" accept="image/*" hidden />
          </label>

          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            required
            disabled
          />
          <button class="btn primary" type="submit" id="sendBtn" disabled>Send</button>
        </form>

        <p class="hint center">Private chats via Firebase.</p>
      </section>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-backdrop hidden" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle">New Chat</h3>

      <form id="contactForm" class="form">
        <label>Friend Email
          <input type="email" id="contactEmail" placeholder="friend@gmail.com" required />
        </label>

        <div class="row">
          <button class="btn" type="button" id="cancelBtn">Cancel</button>
          <button class="btn primary" type="submit" id="saveBtn">Start</button>
        </div>

        <p class="hint">
          Friend must register first, then add his email here.
        </p>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
