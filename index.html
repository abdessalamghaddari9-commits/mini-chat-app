<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MiniChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH SCREEN -->
  <section class="login" id="loginScreen">
    <div class="card">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <h1 class="title" id="authTitle">Sign in</h1>

      <!-- LOGIN -->
      <form id="loginForm" class="form">
        <label>
          Email
          <input type="email" id="loginEmail" placeholder="e.g. you@gmail.com" required />
        </label>

        <label>
          Password
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </label>

        <button class="btn primary" type="submit">Login</button>

        <p class="hint center">
          No account?
          <button type="button" class="btn ghost" id="goRegisterBtn">Create one</button>
        </p>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="form hidden">
        <label>
          Full Name
          <input type="text" id="registerName" placeholder="e.g. Abdessalam" required />
        </label>

        <label>
          Email
          <input type="email" id="registerEmail" placeholder="e.g. you@gmail.com" required />
        </label>

        <label>
          Password (min 6)
          <input type="password" id="registerPassword" placeholder="••••••••" required />
        </label>

        <button class="btn primary" type="submit">Create Account</button>

        <p class="hint center">
          Already have an account?
          <button type="button" class="btn ghost" id="goLoginBtn">Back to login</button>
        </p>
      </form>

      <p class="hint center" id="authMsg" style="margin-top:10px; opacity:0;"></p>
    </div>
  </section>

  <!-- APP -->
  <div class="app hidden" id="appRoot">
    <header class="topbar">
      <div class="brand small">
        <span class="dot"></span>
        <span class="brand-name">MiniChat</span>
      </div>

      <div class="profile">
        <div class="avatar" id="avatar">A</div>
        <div class="profile-info">
          <div class="profile-name" id="userName">User</div>
          <div class="profile-status" id="userStatus">Online</div>
        </div>

        <button class="btn ghost" id="addContactBtn" type="button">+ New Contact</button>
        <button class="btn ghost" id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Contacts</h2>
          <small id="contactsCount">0</small>
        </div>

        <div class="contacts" id="contactsList"></div>
      </aside>

      <section class="chat">
        <div class="chat-head">
          <div class="chat-title">
            <div class="chat-avatar" id="activeAvatar">?</div>
            <div>
              <div class="chat-name" id="activeName">Select a contact</div>
              <div class="chat-sub" id="activeSub">Start chatting</div>
            </div>
          </div>

          <button class="btn ghost" id="clearChatBtn" type="button">Clear Chat</button>
        </div>

        <div class="messages" id="messages"></div>

        <form class="composer" id="messageForm">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            required
            disabled
          />
          <button class="btn primary" type="submit" id="sendBtn" disabled>Send</button>
        </form>

        <p class="hint center">Messages are saved in Firestore.</p>
      </section>
    </main>
  </div>

  <!-- MODAL BACKDROP -->
  <div class="modal-backdrop hidden" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle">New Contact</h3>

      <form id="contactForm" class="form">
        <label>
          Friend Email
          <input type="email" id="contactEmail" placeholder="e.g. friend@gmail.com" required />
        </label>

        <div class="row">
          <button class="btn" type="button" id="cancelBtn">Cancel</button>
          <button class="btn primary" type="submit" id="saveBtn">Save</button>
        </div>

        <p class="hint">Important: your friend must create an account first, then you add his email.</p>
      </form>
    </div>
  </div>

  <!-- IMPORTANT: module -->
  <script type="module" src="app.js"></script>
</body>
</html>
